name: Build kterm for Kindle (ARM)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Build ARM binary in Docker (static VTE from source)
      run: |
        docker run --rm -v "$PWD:/work" -w /work ubuntu:22.04 bash -c '
          set -e
          export DEBIAN_FRONTEND=noninteractive
          dpkg --add-architecture armhf
          # Restrict archive.ubuntu.com to amd64 (no 404s), enable universe
          sed -i "s/ main restricted$/ main restricted universe multiverse/" /etc/apt/sources.list
          sed -i "s/^deb http/deb [arch=amd64] http/" /etc/apt/sources.list
          # Add armhf binary packages from ports.ubuntu.com
          echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse" >> /etc/apt/sources.list
          echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse" >> /etc/apt/sources.list
          echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse" >> /etc/apt/sources.list
          apt-get update -qq

          # amd64 build tools
          # libglib2.0-dev-bin: provides glib-mkenums/glib-genmarshal (perl scripts,
          # run on host during VTE build) without the amd64 headers that conflict with armhf.
          apt-get install -y --no-install-recommends \
            gcc-arm-linux-gnueabihf \
            pkg-config \
            autoconf automake libtool make \
            intltool libxml-parser-perl \
            libglib2.0-dev-bin \
            curl

          # armhf cross-compile targets
          # libwebp/libzstd needed at link time (GTK2 transitive deps via pkg-config);
          # --as-needed drops them from NEEDED since kterm never calls into them.
          apt-get install -y --no-install-recommends \
            libgtk2.0-dev:armhf \
            libncurses5-dev:armhf \
            libdbus-1-dev:armhf \
            libwebp-dev:armhf \
            libzstd-dev:armhf

          # Remove libtinfo.so BEFORE building libvte so that libvte's configure
          # falls back to -lncurses (present as libncurses.so.5 on Kindle).
          # If removed after, vte.pc lists -ltinfo which is absent on the Kindle.
          rm -f /usr/lib/arm-linux-gnueabihf/libtinfo.so /usr/lib/arm-linux-gnueabihf/libtinfo.a

          # Fetch VTE 0.28.2 orig tarball directly from Ubuntu pool (no deb-src needed)
          mkdir -p /tmp/vte-src && cd /tmp/vte-src
          curl -sLo vte.orig.tar.xz \
            "http://archive.ubuntu.com/ubuntu/pool/main/v/vte/vte_0.28.2.orig.tar.xz"
          tar xJf vte.orig.tar.xz
          cd vte-0.28.2
          ./configure \
            --host=arm-linux-gnueabihf \
            --prefix=/opt/vte-static \
            --enable-static \
            --disable-shared \
            --disable-python \
            --disable-gnome-pty-helper \
            CC=arm-linux-gnueabihf-gcc \
            PKG_CONFIG=arm-linux-gnueabihf-pkg-config \
            CFLAGS="-O2 -march=armv7-a -mfpu=neon -mfloat-abi=hard" \
            PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig \
            PKG_CONFIG_LIBDIR=/usr/lib/arm-linux-gnueabihf/pkgconfig:/usr/share/pkgconfig \
          || { echo "=== config.log (last 40 lines) ==="; tail -40 config.log; exit 1; }
          make -j$(nproc)
          make install

          # Build kterm — configure.ac handles static VTE detection automatically
          cd /work
          export PKG_CONFIG_PATH=/opt/vte-static/lib/pkgconfig:/usr/lib/arm-linux-gnueabihf/pkgconfig
          export PKG_CONFIG_LIBDIR=/opt/vte-static/lib/pkgconfig:/usr/lib/arm-linux-gnueabihf/pkgconfig:/usr/share/pkgconfig
          ./autogen.sh
          ./configure \
            --host=arm-linux-gnueabihf \
            --enable-kindle \
            CC=arm-linux-gnueabihf-gcc \
            PKG_CONFIG=arm-linux-gnueabihf-pkg-config \
            CFLAGS="-O2 -march=armv7-a -mfpu=neon -mfloat-abi=hard" \
          || { echo "=== config.log (last 40 lines) ==="; tail -40 config.log; exit 1; }
          make -j$(nproc)
          echo "=== NEEDED libs ===" && arm-linux-gnueabihf-objdump -p kterm | grep NEEDED
        '

    - name: Verify ARM binary
      run: file kterm

    - name: Upload kterm binary
      uses: actions/upload-artifact@v4
      with:
        name: kterm-kindle-armhf
        path: kterm
        retention-days: 30
