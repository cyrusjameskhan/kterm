name: Build kterm for Kindle (ARM)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Build ARM binary in Docker (clean Ubuntu 22.04 + armhf multiarch)
      run: |
        docker run --rm -v "$PWD:/work" -w /work ubuntu:22.04 bash -c '
          set -e
          export DEBIAN_FRONTEND=noninteractive
          dpkg --add-architecture armhf
          # Enable universe (for libvte-common), then restrict to [arch=amd64] (still serves arch=all)
          sed -i "s/ main restricted$/ main restricted universe multiverse/" /etc/apt/sources.list
          sed -i "s/^deb http/deb [arch=amd64] http/" /etc/apt/sources.list
          # Add armhf binary packages from ports.ubuntu.com
          echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse" >> /etc/apt/sources.list
          echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse" >> /etc/apt/sources.list
          echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse" >> /etc/apt/sources.list
          # Clean update: archive.ubuntu.com restricted to amd64 (no 404s), ports has armhf
          apt-get update -qq
          echo "=== libvte9:armhf policy ===" && apt-cache policy libvte9:armhf 2>&1 || true
          echo "=== libvte-common policy ===" && apt-cache policy libvte-common 2>&1 || true
          echo "=== libvte9:armhf dry run ===" && apt-get install --dry-run libvte9:armhf 2>&1 | tail -20 || true
          apt-get install -y --no-install-recommends \
            gcc-arm-linux-gnueabihf \
            pkg-config \
            libgtk2.0-dev:armhf \
            libvte-dev:armhf \
            libtinfo-dev:armhf \
            libdbus-1-dev:armhf \
            autoconf automake make
          export PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig
          export PKG_CONFIG_LIBDIR=/usr/lib/arm-linux-gnueabihf/pkgconfig:/usr/share/pkgconfig
          ./autogen.sh
          ./configure \
            --host=arm-linux-gnueabihf \
            --enable-kindle \
            CC=arm-linux-gnueabihf-gcc \
            PKG_CONFIG=arm-linux-gnueabihf-pkg-config \
            CFLAGS="-O2 -march=armv7-a -mfpu=neon -mfloat-abi=hard"
          make -j$(nproc)
        '

    - name: Verify ARM binary
      run: file kterm

    - name: Upload kterm binary
      uses: actions/upload-artifact@v4
      with:
        name: kterm-kindle-armhf
        path: kterm
        retention-days: 30
