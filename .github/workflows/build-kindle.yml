name: Build kterm for Kindle (ARM)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up armhf cross-compilation
      run: |
        sudo dpkg --add-architecture armhf

        # Restrict ALL existing sources to amd64 only (handles both http:// and https://)
        # so apt doesn't try to fetch armhf from security.ubuntu.com (which has no armhf).
        sudo sed -i '/^\s*deb\s*\[/!s/^\s*deb\s/deb [arch=amd64] /' /etc/apt/sources.list
        sudo find /etc/apt/sources.list.d/ -name "*.list" \
          -exec sudo sed -i '/^\s*deb\s*\[/!s/^\s*deb\s/deb [arch=amd64] /' {} \;

        # Add armhf binary packages from ports.ubuntu.com in a separate list file
        printf '%s\n' \
          'deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse' \
          'deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse' \
          'deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse' \
          | sudo tee /etc/apt/sources.list.d/armhf-ports.list
        sudo apt-get update -qq

        # Install all packages in ONE call so apt resolves conflicts upfront.
        # Use libncurses-dev:armhf (ncurses6) — libncurses5-dev:armhf conflicts with
        # libncurses-dev:amd64 which gcc-arm-linux-gnueabihf depends on.
        # libglib2.0-dev-bin: glib-mkenums/glib-genmarshal for VTE build (no amd64 headers).
        # libwebp/libzstd:armhf needed at link time (GTK2 pkg-config transitive deps).
        sudo apt-get install -y --no-install-recommends \
          gcc-arm-linux-gnueabihf \
          binutils-arm-linux-gnueabihf \
          pkg-config \
          autoconf automake libtool make \
          intltool libxml-parser-perl \
          libglib2.0-dev-bin \
          curl \
          libgtk2.0-dev:armhf \
          libncurses-dev:armhf \
          libdbus-1-dev:armhf \
          libwebp-dev:armhf \
          libzstd-dev:armhf

        # Sanity-check the cross-compiler
        arm-linux-gnueabihf-gcc --version
        echo "int main(){}" | arm-linux-gnueabihf-gcc -x c - -o /tmp/cc_test && echo "CC OK"

    - name: Build static libvte 0.28.2 for armhf
      run: |
        mkdir -p /tmp/vte-src && cd /tmp/vte-src
        curl -sLo vte.orig.tar.xz \
          "http://archive.ubuntu.com/ubuntu/pool/main/v/vte/vte_0.28.2.orig.tar.xz"
        tar xJf vte.orig.tar.xz
        cd vte-0.28.2
        ./configure \
          --host=arm-linux-gnueabihf \
          --prefix=/opt/vte-static \
          --enable-static \
          --disable-shared \
          --disable-python \
          --disable-gnome-pty-helper \
          CC=arm-linux-gnueabihf-gcc \
          PKG_CONFIG=arm-linux-gnueabihf-pkg-config \
          CFLAGS="-O2 -march=armv7-a -mfpu=neon -mfloat-abi=hard" \
          PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig \
          PKG_CONFIG_LIBDIR=/usr/lib/arm-linux-gnueabihf/pkgconfig:/usr/share/pkgconfig \
        || { echo "=== config.log (first 100 lines) ==="; head -100 config.log; exit 1; }
        make -j$(nproc)
        sudo make install

    - name: Build kterm
      run: |
        export PKG_CONFIG_PATH=/opt/vte-static/lib/pkgconfig:/usr/lib/arm-linux-gnueabihf/pkgconfig
        export PKG_CONFIG_LIBDIR=/opt/vte-static/lib/pkgconfig:/usr/lib/arm-linux-gnueabihf/pkgconfig:/usr/share/pkgconfig
        ./autogen.sh
        ./configure \
          --host=arm-linux-gnueabihf \
          --enable-kindle \
          CC=arm-linux-gnueabihf-gcc \
          PKG_CONFIG=arm-linux-gnueabihf-pkg-config \
          CFLAGS="-O2 -march=armv7-a -mfpu=neon -mfloat-abi=hard" \
        || { echo "=== config.log (last 40 lines) ==="; tail -40 config.log; exit 1; }
        make -j$(nproc)
        echo "=== NEEDED libs ===" && arm-linux-gnueabihf-objdump -p kterm | grep NEEDED

    - name: Verify ARM binary
      run: file kterm

    - name: Upload kterm binary
      uses: actions/upload-artifact@v4
      with:
        name: kterm-kindle-armhf
        path: kterm
        retention-days: 30
