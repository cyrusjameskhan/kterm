name: Build kterm for Kindle (ARM)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Build ARM binary in Docker (clean Ubuntu 22.04 + armhf multiarch)
      run: |
        docker run --rm -v "$PWD:/work" -w /work ubuntu:22.04 bash -c '
          set -e
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          dpkg --add-architecture armhf
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            gcc-arm-linux-gnueabihf \
            pkg-config \
            libgtk2.0-dev:armhf \
            libvte-dev:armhf \
            libtinfo-dev:armhf \
            libdbus-1-dev:armhf \
            autoconf automake make
          PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig
          PKG_CONFIG_LIBDIR=/usr/lib/arm-linux-gnueabihf/pkgconfig:/usr/share/pkgconfig
          export PKG_CONFIG_PATH PKG_CONFIG_LIBDIR
          ./autogen.sh
          ./configure \
            --host=arm-linux-gnueabihf \
            --enable-kindle \
            CC=arm-linux-gnueabihf-gcc \
            PKG_CONFIG=arm-linux-gnueabihf-pkg-config \
            CFLAGS="-O2 -march=armv7-a -mfpu=neon -mfloat-abi=hard"
          make -j$(nproc)
        '

    - name: Verify ARM binary
      run: file kterm

    - name: Upload kterm binary
      uses: actions/upload-artifact@v4
      with:
        name: kterm-kindle-armhf
        path: kterm
        retention-days: 30
